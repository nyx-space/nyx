[package]
name = "nyx-space"
build = "build.rs"
version = "2.4.0"
edition = "2021"
authors = ["Christopher Rabotin <christopher.rabotin@gmail.com>"]
description = "A high-fidelity space mission toolkit, with orbit propagation, estimation and some systems engineering"
homepage = "https://nyxspace.com"
documentation = "https://docs.rs/nyx-space/"
repository = "https://github.com/nyx-space/nyx"
keywords = ["space", "mission", "design", "orbit", "estimation"]
categories = ["science", "simulation", "aerospace", "science::robotics"]
readme = "README.md"
license = "AGPL-3.0-or-later"
exclude = [
    ".cargo/",
    ".github/",
    ".venv/",
    ".vscode/",
    "data/",
    "*.parquet",
    "*.tdm",
    "firebase.json",
    "rustfmt.toml",
    "*.script",
    "*.png",
    "*.pca",
]

[badges]
maintenance = { status = "actively-developed" }
github = { repository = "nyx-space/nyx", branch = "master" }

[dependencies]
der = { version = "0.7", features = ["derive", "alloc", "real"] }
nalgebra = "0.34"
log = "0.4"
hifitime = "4.2.5"
anise = {version = "0.9.6", features=[ "analysis" ] }
flate2 = { version = "1.0", features = [
    "rust_backend",
], default-features = false }
serde = "1.0"
serde_derive = "1.0"
hyperdual = "1.4.0"
rand = "0.10"
rand_distr = "0.6"
regex = "1.5"
rayon = "1.6"
approx = "0.5"
rand_pcg = "0.10"
indicatif = { version = "0.18", features = ["rayon"], default-features = false }
rstats = "2.0.1"
parquet = { version = "58.0.0", default-features = false, features = [
    "arrow",
    "zstd",
] }
arrow = "58.0.0"
shadow-rs = { version = "1.0.1", default-features = false }
serde_yml = "0.0.12"
whoami = "2.1.1"
either = { version = "1.8.1", features = ["serde"] }
num = "0.4.0"
typed-builder = "0.23.0"
snafu = { version = "0.9.0", features = ["backtrace"] }
serde_dhall = "0.13"
indexmap = { version = "2.6.0", features = ["serde"] }
statrs = "0.18.0"
