DSS-65 Madrid:
  name: DSS-65 Madrid
  location:
    latitude_deg: 40.427222
    longitude_deg: 4.250556
    height_km: 0.834939
    terrain_mask:
      - azimuth_deg: 0.0
        elevation_mask_deg: 5.0
    terrain_mask_ignored: false
    frame:
      ephemeris_id: 399
      orientation_id: 399
  elevation_mask_deg: 5.0
  stochastic_noises:
    range_km:
      white_noise:
        mean: 0.0
        sigma: 5.0e-3 # 5 m
    doppler_km_s:
      white_noise:
        mean: 0.0
        sigma: 50.0e-6 # 5 cm/s
  light_time_correction: false
  measurement_types:
    - range_km
    - doppler_km_s

